[domain]
"@type" = "kvm"
name = "nixos"
uuid = "4dea24b3-1d52-d8f3-2516-782e98a23fa0"
memory = 140000
vcpu = 2

[domain.os.type]
"@arch" = "x86_64"
"#text" = "hvm"

[domain.clock]
"@sync" = "localtime"

# [domain.devices]
# emulator = "/usr/bin/env qemu-kvm"

[[domain.devices.disk]]
"@type" = "file"
"@device" = "disk"
"@bus" = "virtio"
"@size" = 16
source."@file" = "/home/anon/ISO/nixos-crocuda.qcow2"
target."@dev" = "hda"

