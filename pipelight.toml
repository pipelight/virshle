[[pipelines]]
name = "build:disk:base"

[[pipelines.steps]]
name = "build base disk image"
commands = [
  # Update flake deps
  # "nix flake update",

  # Build flake
  """
  nix build ".#vm_base" \
  --out-link ./result_vms \
  --show-trace \
  """,
  """
  cp -f \ 
  ./result_vms/nixos.img \
  ~/Iso/nixos.efi.img
  """,
  # Set permissions
  "chmod +x ~/Iso/nixos.efi.img",
  "chmod +w ~/Iso/nixos.efi.img",
]

[[pipelines]]
name = "build:disk:all"

[[pipelines.steps]]
name = "build base disk image"
commands = [
  # Build flake
  """
  nix build ".#vm_all_sizes" \
  --out-link ./result_vms \
  --show-trace \
  """,
]
[[pipelines.steps]]
name = "copy disk images to cache"
commands = [
  # Copy to destinations
  "cp -f ./result_vms/nixos.*.img /var/lib/virshle/cache/",
  "cp -f ./result_vms/nixos.*.img ~/Iso",
  # Set permissions
  "chmod +x /var/lib/virshle/cache/*",
  "chmod +w /var/lib/virshle/cache/*",
  "chmod +x ~/Iso/*",
  "chmod +w ~/Iso/*",
]

