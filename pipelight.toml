[[pipelines]]
name = "test-ovs-nixosModule"
[[pipelines.steps]]

name = "build openvswitch test flake"
commands = [
  # Update flake deps
  "nix flake update --flake ./modules/tests/openvswitch",
  # Build flake
  """
  nixos-rebuild build \
  --flake './modules/tests/openvswitch#default' \
  """,
]

[[pipelines]]
name = "test-nixosModule-dirty"
[[pipelines.steps]]
name = "build module test flake"
commands = [
  # Update flake deps
  "nix flake update --flake ./templates/host",
  "nix flake update --flake ./templates/vm",
  # Build flake
  """
  nixos-rebuild build \
  --flake './templates/host#default' \
  --override-input virshle ./
  """,
  """
  nixos-rebuild build \
  --flake './templates/vm#default' \
  --override-input virshle ./
  """,
]
