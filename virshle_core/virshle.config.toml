#########################
# Testing Templates: 
# for testing vm

# No network
[[template.vm]]
name = "xxs-offline"
vcpu = 1
vram = "2GiB"
[[template.vm.disk]]
name = "os"
path = "~/Iso/nixos.xxs.efi.img"

# Tap network device
[[template.vm]]
name = "xxs-tap"
vcpu = 1
vram = "2GiB"
[[template.vm.disk]]
name = "os"
path = "~/Iso/nixos.xxs.efi.img"
[[template.vm.net]]
name = "main"
[template.vm.net.type.tap]

# Macvtap network device
# Not working yet as of Cloud-hypervisor 42.0 but still we get prepared.
[[template.vm]]
name = "xxs-macvtap"
vcpu = 1
vram = "2GiB"
[[template.vm.disk]]
name = "os"
path = "~/Iso/nixos.xxs.efi.img"
[[template.vm.net]]
name = "main"
[template.vm.net.type.macvtap]


